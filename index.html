<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vilmar Ferreira Costa | Advogado</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold': '#b89a5a',
                        'black-pure': '#0a0a0a',      /* Hero */
                        'black-soft': '#111111',      /* Sobre, Áreas */
                        'black-header': '#0d0d0d',    /* Header, Trajetória, Contato */
                        'black-footer': '#080808',    /* Footer */
                        'gray-light': '#cccccc',
                        'gray-medium': '#999999',
                    },
                    fontFamily: {
                        'serif': ['"Cormorant Garamond"', 'serif'],
                        'sans': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --gold: #b89a5a;
            --black-hero: #0a0a0a;
            --black-about: #111111;
            --black-header: #0d0d0d;
            --black-footer: #080808;
            --white: #ffffff;
            --gray-light: #cccccc;
            --gray-mid: #999999;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background-color: var(--black-hero);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .font-serif { font-family: 'Cormorant Garamond', serif; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--black-footer); }
        ::-webkit-scrollbar-thumb { background: var(--gold); }

        /* General Section Styling */
        section {
            width: 100%;
            display: block;
            position: relative;
            border-bottom: 1px solid rgba(184, 154, 90, 0.1);
        }

        /* Animations */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .timeline-item {
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.6s ease-out;
        }
        .timeline-item.active {
            opacity: 1;
            transform: translateX(0);
        }

        /* Header & Mobile Menu */
        #main-header {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        #mobile-menu {
            position: fixed;
            inset: 0;
            z-index: 60;
            background-color: #0d0d0d;
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
        }
        #mobile-menu.active {
            transform: translateX(0);
        }
        .mobile-link {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
        }
        #mobile-menu.active .mobile-link {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.3s;
        }

        /* Card Decoration */
        .area-card {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(184, 154, 90, 0.15);
        }
        .area-card:hover {
            border-left: 3px solid var(--gold);
            background: rgba(184, 154, 90, 0.05);
            transform: translateY(-5px);
        }



        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Inputs */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: white;
            -webkit-box-shadow: 0 0 0px 1000px #0a0a0a inset;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>

    <!-- HEADER FIXO -->
    <header id="main-header" class="fixed top-0 left-0 w-full z-50 transition-all duration-300 border-b border-[#b89a5a]/30 bg-[#0d0d0d] h-[80px] flex items-center">
        <div class="max-w-7xl mx-auto px-6 md:px-12 w-full flex justify-between items-center">
            <!-- Logo -->
            <a href="#" class="flex items-center group gap-4">
                <img src="/public/logo.png" alt="Logo Vilmar Costa" class="h-10 w-auto">
                <div class="flex flex-col">
                    <span class="font-serif text-[22px] leading-tight text-white group-hover:text-gold transition-colors">Vilmar Ferreira Costa</span>
                    <span class="font-sans text-[10px] uppercase tracking-[0.2em] text-[#999999]">Advogado</span>
                </div>
            </a>

            <!-- Desktop Menu -->
            <nav class="hidden md:flex items-center space-x-10">
                <a href="#" class="text-[11px] uppercase tracking-[0.12em] text-[#cccccc] hover:text-white transition-all duration-200">Início</a>
                <a href="#sobre" class="text-[11px] uppercase tracking-[0.12em] text-[#cccccc] hover:text-white transition-all duration-200">Sobre</a>
                <a href="#areas" class="text-[11px] uppercase tracking-[0.12em] text-[#cccccc] hover:text-white transition-all duration-200">Áreas</a>
                <a href="#contato" class="text-[11px] uppercase tracking-[0.12em] text-[#b89a5a] border border-[#b89a5a] px-5 py-2 hover:bg-[#b89a5a] hover:text-[#0d0d0d] transition-all duration-250">Contato</a>
            </nav>

            <!-- Mobile Toggle -->
            <button id="menu-toggle" class="md:hidden text-white text-2xl focus:outline-none">
                ☰
            </button>
        </div>
    </header>

    <!-- MOBILE MENU OVERLAY -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] flex flex-col items-center justify-center space-y-10 md:hidden bg-[#0d0d0d]">
        <button id="menu-close" class="absolute top-8 right-8 text-white text-4xl">&times;</button>
        <div class="flex flex-col items-center space-y-4 mb-8">
            <span class="text-gold text-[10px] uppercase tracking-[0.3em]">Contato Direto</span>
            <span class="text-white text-2xl font-light">(16) 98830-8292</span>
        </div>
        <a href="https://wa.me/5516988308292" target="_blank" class="mobile-link bg-gold text-black-header uppercase tracking-widest px-10 py-5 hover:bg-white transition-all font-bold">WhatsApp Agora</a>
        <div class="flex flex-col items-center space-y-6 pt-10 border-t border-gold/10 w-2/3">
            <a href="#" class="mobile-link text-sm uppercase tracking-widest text-gray-mid hover:text-gold">Início</a>
            <a href="#sobre" class="mobile-link text-sm uppercase tracking-widest text-gray-mid hover:text-gold">Sobre</a>
            <a href="#areas" class="mobile-link text-sm uppercase tracking-widest text-gray-mid hover:text-gold">Áreas</a>
        </div>
    </div>

    <!-- SEÇÃO 1 — HERO -->
    <section class="relative h-screen min-h-[600px] flex items-center overflow-hidden bg-[#0a0a0a]">
        <!-- Partículas Background -->
        <canvas id="particles-canvas"></canvas>

        <div class="relative z-10 w-full px-6 md:px-[10%]">
            <div class="max-w-3xl reveal">
                <img src="/public/logo.png" alt="Logo Balança" class="w-16 h-16 mb-8">
                <h1 class="font-serif text-4xl md:text-[64px] leading-tight mb-8 text-white">
                    Vilmar Ferreira Costa Advogado
                </h1>
                <p class="text-gray-light text-lg md:text-[20px] mb-12 max-w-xl leading-relaxed">
                    Comprometidos com a justiça. Dedicados à defesa integral dos seus direitos com ética e excelência.
                </p>
                <div class="flex flex-wrap gap-4">
                    <a href="https://wa.me/5516988308292?text=Olá%2C%20vim%20pelo%20site%20e%20gostaria%20de%20agendar%20uma%20consulta." 
                       target="_blank" 
                       class="inline-block border border-gold px-10 py-5 text-[13px] tracking-[0.15em] font-bold text-gold hover:bg-gold hover:text-black-pure transition-all duration-300">
                        FALE CONOSCO
                    </a>
                    <a href="#areas" 
                       class="inline-block border border-gold px-10 py-5 text-[13px] tracking-[0.15em] font-bold text-gold hover:bg-gold hover:text-black-pure transition-all duration-300">
                        VER SERVIÇOS
                    </a>
                </div>
            </div>
        </div>
    </section>



    <!-- SEÇÃO 2 — SOBRE -->
    <section id="sobre" class="bg-[#111111] py-24 md:py-[120px] px-6 md:px-[10%]">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-16 items-center">
            <!-- Foto Coluna -->
            <div class="w-full md:w-1/2 reveal">
                <div class="relative aspect-[4/5] bg-[#0d0d0d] border border-white/5 flex items-center justify-center overflow-hidden shadow-2xl">
                    <img src="/public/logo.png
